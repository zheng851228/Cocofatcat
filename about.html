        <div style="width: 40px; height: 2px; background: var(--primary-color); margin: 0 auto 30px auto;"></div>
        
        <p style="color:#666; line-height:2.2; margin:40px auto 60px auto; letter-spacing: 2.5px; max-width: 500px;">

                又肥又圓的療癒身軀，<br>
                最獨特的是她走路時一拐一拐、掰咖的後腳。<br>
                在我們眼裡，她非常可愛，<br>
                因為她的不完美，所以她最完美。

            <div class="coco-photo-wrapper" style="max-width: 800px; margin: 0 auto; overflow: hidden; border: 1px solid #eee; background: #fff; border-radius: 16px;">
